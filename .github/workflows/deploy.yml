name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --manifest-path cheerio/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp cheerio/target/wasm32-unknown-unknown/release/cheerio.wasm dist/
          MINIQUAD_JS=$(find ~/.cargo/registry/src -path "*/macroquad-0.4*/js/mq_js_bundle.js" | head -1)
          cp "$MINIQUAD_JS" dist/mq_js_bundle.js
          cp -r cheerio/assets dist/
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>Cheerio</title>
              <link rel="icon" type="image/png" href="assets/favicon.png">
              <style>
                  * { margin: 0; padding: 0; }
                  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
                  canvas { display: block; width: 100%; height: 100%; }
                  #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #4AB7FF; z-index: 900; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: monospace; color: #fff; }
                  #loader h1 { font-size: 48px; margin-bottom: 24px; letter-spacing: 4px; }
                  #loader .bar-bg { width: 200px; height: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
                  #loader .bar-fill { width: 0%; height: 100%; background: #fff; border-radius: 6px; animation: loading 2s ease-in-out infinite; }
                  @keyframes loading { 0% { width: 0%; } 50% { width: 80%; } 100% { width: 100%; } }
                  #loader p { margin-top: 16px; font-size: 14px; opacity: 0.8; }
                  @media (orientation: portrait) {
                      #rotate-msg { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #fff; z-index: 999; align-items: center; justify-content: center; flex-direction: column; font-family: monospace; font-size: 18px; }
                      #rotate-msg span { font-size: 48px; margin-bottom: 16px; }
                  }
                  @media (orientation: landscape) { #rotate-msg { display: none; } }
              </style>
          </head>
          <body>
              <div id="loader"><h1>CHEERIO</h1><div class="bar-bg"><div class="bar-fill"></div></div><p>Loading...</p></div>
              <div id="rotate-msg"><span>&#x21BB;</span>Rotate your phone to landscape</div>
              <canvas id="glcanvas" tabindex="1"></canvas>
              <script src="mq_js_bundle.js"></script>
              <script>
              var _origLoad = load;
              load = function(wasm_path) {
                  _origLoad(wasm_path);
                  var frames = 0;
                  function waitForRender() {
                      var c = document.getElementById("glcanvas");
                      var gl = c && (c.getContext("webgl2") || c.getContext("webgl"));
                      if (gl) { frames++; }
                      if (frames > 10) {
                          var l = document.getElementById("loader");
                          if (l) { l.style.transition = "opacity 0.3s"; l.style.opacity = "0"; setTimeout(function() { l.style.display = "none"; }, 300); }
                      } else { requestAnimationFrame(waitForRender); }
                  }
                  requestAnimationFrame(waitForRender);
              };
              load("cheerio.wasm");
              </script>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
